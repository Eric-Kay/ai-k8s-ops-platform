version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai-k8s-postgres
    environment:
      POSTGRES_DB: aik8sops
      POSTGRES_USER: aik8sadmin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: ai-k8s-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: aik8sops
      POSTGRES_USER: aik8sadmin
      POSTGRES_PASSWORD: password
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: ai-k8s-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend